  ## ------ NEW INDOOR CLIMATE ------
  - title: Climate
    path: climate
    icon: mdi:home-thermometer-outline
    type: sections
    max_columns: 3
    badges: []

    sections:
      # HOUSE INDOOR CLIMATE CARDS
      - type: grid
        cards:
          - type: heading
            heading: House
            heading_style: title
            icon: mdi:home-thermometer-outline

          # HOUSE SUMMARY AND ROOM TEMPERATURES CARD
          - type: custom:stack-in-card
            mode: vertical
            keep:
              background: true
              border_radius: true
              box_shadow: true
              margin: false
            card_mod:
              style: |
                ha-card {
                  border-radius: 24px;
                  background: rgba(255,255,255,0.025);
                  border: 1px solid rgba(255,255,255,0.075);
                  box-shadow: 0 8px 24px rgba(0,0,0,0.14);
                  overflow: hidden;
                }
            cards:
              # HOUSE HERO CARD
              - type: custom:button-card
                entity: sensor.hvac_ecobee_indoor_average_temperature
                name: >
                  [[[
                    const temp = states['sensor.hvac_ecobee_indoor_average_temperature']?.state ?? '—';
                    return `${temp} °C`;
                  ]]]
                icon: mdi:home-thermometer-outline
                show_state: false
                show_label: true
                label: >
                  [[[
                    const hvac = states['sensor.house_hvac_display_state']?.state ?? 'Idle';
                    const spreadRaw = states['sensor.living_space_temperature_spread']?.state;

                    let spreadText = 'Spread —';
                    let spreadColor = 'rgba(220,220,220,0.72)';

                    if (
                      spreadRaw !== undefined &&
                      spreadRaw !== null &&
                      spreadRaw !== 'unknown' &&
                      spreadRaw !== 'unavailable'
                    ) {
                      const spread = parseFloat(spreadRaw);

                      if (!isNaN(spread)) {
                        spreadText = `Spread ${spread.toFixed(1)} °C`;

                        if (spread <= 2.0) {
                          spreadColor = 'rgba(255,255,255,0.72)';
                        } else if (spread < 3.5) {
                          spreadColor = 'rgba(255, 224, 130, 0.68)';
                        } else {
                          spreadColor = 'rgba(255, 204, 188, 0.72)';
                        }
                      }
                    }

                    return `House · ${hvac} · <span style="color:${spreadColor}; font-weight:600;">${spreadText}</span>`;
                  ]]]
                styles:
                  card:
                    - min-height: 72px
                    - padding: 12px 16px 2px 16px
                    - border-radius: 0
                    - background: transparent
                    - border: none
                    - box-shadow: none
                  grid:
                    - grid-template-areas: '"i n" "i l"'
                    - grid-template-columns: 58px 1fr
                    - grid-template-rows: min-content min-content
                    - column-gap: 12px
                    - align-items: center
                  img_cell:
                    - width: 48px
                    - height: 48px
                    - border-radius: 0
                    - background: transparent
                  icon:
                    - width: 38px
                    - color: >
                        [[[
                          const hvac = states['sensor.house_hvac_display_state']?.state ?? 'Idle';
                          if (hvac === 'Cooling') return '#71b7f4';
                          if (hvac === 'Heating') return '#ffad33';
                          if (hvac === 'Fan') return '#90caf9';
                          return '#ffca28';
                        ]]]
                  name:
                    - justify-self: start
                    - font-size: 30px
                    - font-weight: 750
                    - letter-spacing: -0.4px
                    - color: var(--primary-text-color)
                    - line-height: 1.05
                  label:
                    - justify-self: start
                    - font-size: 15px
                    - opacity: 0.82
                    - color: var(--primary-text-color)
                    - line-height: 1.2

              # HOUSE AIR QUALITY SUMMARY CARDS
              - type: grid
                columns: 3
                square: false
                cards:
                  # house avg humidity
                  - type: custom:button-card
                    entity: sensor.indoor_mean_humidity
                    name: Humidity
                    icon: mdi:water-percent
                    show_state: true
                    show_icon: true
                    styles:
                      card:
                        - margin: 0 2px 4px 8px
                        - padding: 6px 4px
                        - background: transparent
                        - border: none
                        - box-shadow: none
                      grid:
                        - grid-template-areas: '"i n" "i s"'
                        - grid-template-columns: 32px 1fr
                        - align-items: center
