            - entity_id: 'media_player.plex_livingroom'
              state: '/(playing|paused)/'
              options:
                type: 'custom:mini-media-player'
                name: 'Living Room: HTPC'
                info: short
                hide:
                  progress: true
                  prev: true
                  next: true
                  power: true
                  volume: true
                <<: *media-player-card-style
            # htpc :: main bedroom (plex)
            - entity_id: 'media_player.plex_main_bedroom'
              state: '/(playing|paused)/'
              options:
                type: 'custom:mini-media-player'
                name: 'Main Bedroom: HTPC'
                info: short
                hide:
                  progress: true
                  prev: true
                  next: true
                  power: true
                  volume: true
                <<: *media-player-card-style

            # speakers :: paused
            - entity_id: 'media_player.*_speaker'
              last_changed: < 2 # minutes
              state: 'paused'
              attributes:
                media_artist: "*"
              options:
                type: 'custom:mini-media-player'
                hide:
                  next: true
                  prev: true
                  power: true
                  progress: true
                  source: true
                  volume: true
                <<: *media-player-card-style
            # speakers :: playing
            - entity_id: 'media_player.*_speaker'
              state: playing
              attributes:
                media_artist: "*"
              options:
                type: 'custom:mini-media-player'
                hide:
                  prev: true
                  power: true
                  progress: true
                  source: true
                <<: *media-player-card-style
