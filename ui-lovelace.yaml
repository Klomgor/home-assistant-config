              state_adaptive_color: true
            # cab humidity
            - entity: sensor.snr_outside_tacomacabclimate_humidity
              name: 'Cab Humidity'
              line_width: 1
              show_legend: false
              show_fill: false
              state_adaptive_color: true
              color: '#5f9bea'
              y_axis: secondary
            # box humidity
            - entity: sensor.snr_outside_tacomaboxclimate_humidity
              name: 'Box Humidity'
              line_width: 1
              show_legend: false
              show_fill: false
              state_adaptive_color: true
              color: '#5f9bea'
              y_axis: secondary

        # TACOMA PRESENCE GRAPH
        - type: 'custom:mini-graph-card'
          show:
            extrema: false
            fill: fade
            icon: false
            labels: hover
            labels_secondary: hover
            name: false
            state: false
          height: 20
          line_width: 1
          hours_to_show: 24
          points_per_hour: 60
          group: true
          <<: *mini-graph-style
          entities:
            # tacoma is home/away
            - entity: binary_sensor.snr_tacoma_location
              name: 'Tacoma Location'
              color: '#afafaf'
              show_legend: true
              show_line: false
              show_points: false
          state_map:
            - value: 'on'
              label: away
            - value: 'off'
              label: "home"


