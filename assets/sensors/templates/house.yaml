## SENSORS / TEMPLATES / HOUSE

# house co2
- name: 'Indoor Mean Co2 Rounded'
  device_class: carbon_dioxide
  unit_of_measurement: 'ppm'
  state: >
    {% if is_number(states('sensor.indoor_mean_co2_calculation')) %}
      {{ states('sensor.indoor_mean_co2_calculation') | int }}
    {% else %}
      {# use previous value if sensor returns unknown #}
      {{ states('sensor.indoor_mean_co2_rounded') }}
    {% endif %}

# hvac filter change interval
- name: 'HVAC Filter Change Interval'
  unit_of_measurement: 'days'
  icon: 'mdi:air-filter'
  # calculate days since the air filter was last changed
  #  -- convert seconds to days
  state: >
    {{ ((as_timestamp(now()) - state_attr('input_datetime.hvac_filter_last_changed','timestamp')) | int / 60/1440) | round(0) }}

# -- ecobee --
# current_temperature from ecobee
- name: 'HVAC Ecobee Indoor Average Temperature'
  device_class: temperature
  unit_of_measurement: '°C'
  state: >
    {% if is_number(state_attr('climate.amazon', 'current_temperature')) %}
      {{ state_attr('climate.amazon', 'current_temperature') }}
    {% endif %}

# humidity from ecobee
- name: 'HVAC Ecobee Indoor Average Humidity'
  device_class: humidity
  unit_of_measurement: '%'
  state: >
    {% if is_number(state_attr('climate.amazon', 'current_humidity')) %}
      {{ state_attr('climate.amazon', 'current_humidity') | float(2) }}
    {% endif %}

# current mean humidity from min_max calculation
- name: 'Indoor Mean Humidity'
  device_class: humidity
  unit_of_measurement: '%'
  # return last value if we get 'unknown' state attribute from device. this
  # happens for zigbee devices after home assistant restart.
  state: >
    {% if is_number(states('sensor.indoor_mean_humidity_calculation')) %}
      {{ states('sensor.indoor_mean_humidity_calculation') | int }}
    {% else %}
      {# use previous value if sensor returns unknown #}
      {{ states('sensor.indoor_mean_humidity') }}
    {% endif %}

# countdown timer (days) to christmas
- name: "Days Until Christmas"
  unique_id: 'days_until_christmas'
  unit_of_measurement: "days"
  state: >
    {% set today = now().date() %}
    {% set year  = now().year   %}
    {% set christmas = strptime(year ~ '-12-25', '%Y-%m-%d').date() %}

    {# christmas has passed this year, use next year #}
    {% if christmas < today %}
      {% set christmas = strptime((year + 1) ~ '-12-25', '%Y-%m-%d').date() %}
    {% endif %}

    {{ (christmas - today).days }}

# house hvac display state
- name: 'House HVAC Display State'
  unique_id: house_hvac_display_state
  icon: mdi:hvac
  state: >
    {% if is_state('binary_sensor.hvac_house_cooling_state', 'on') %}
      Cooling
    {% elif is_state('binary_sensor.hvac_house_heating_state', 'on') %}
      Heating
    {% elif is_state('binary_sensor.hvac_house_fan_state', 'on') %}
      Fan
    {% else %}
      Idle
    {% endif %}

# living space temperature spread
- name: 'Living Space Temperature Spread'
  unique_id: living_space_temperature_spread
  unit_of_measurement: "°C"
  device_class: temperature
  state_class: measurement
  icon: mdi:thermometer-lines
  state: >
    {% set temps = [
      states('sensor.uptairs_hallway_temperature') | float(none),
      states('sensor.main_bedroom_mean_temperature_calculation') | float(none),
      states('sensor.kids_bedroom_mean_temperature_calculation') | float(none),
      states('sensor.snr_sparebedroom_climatedisplay_temperature') | float(none),
      states('sensor.kitchen_mean_temperature_calculation') | float(none),
      states('sensor.snr_familyroom_climatedisplay_temperature') | float(none),
      ] | reject('eq', none) | list %}
    {% if temps | count > 1 %}
     {{ ((temps | max) - (temps | min)) | round(1) }}
    {% else %}
      unknown
    {% endif %}
