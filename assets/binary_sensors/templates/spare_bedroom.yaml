## BINARY SENSORS / TEMPLATES / SPARE BEDROOM

# -- sonoff --
# heater running (via plug)
- name: 'Spare Bedroom Heating State'
  unique_id: 'spare_bedroom_heating_state'
  device_class: running
  icon: 'mdi:radiator'
  availability: >
    {{ is_number(states('sensor.spare_bedroom_heater_plug_energy_power')) }}
  # power reported in watts (w)
  state: >
    {% set power = states('sensor.spare_bedroom_heater_plug_energy_power') | float(0) %}
    {{ power > 10 }}
