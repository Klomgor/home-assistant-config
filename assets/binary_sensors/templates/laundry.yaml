## BINARY SENSORS / TEMPLATES / LAUNDRY

# -- sonoff --
# washing machine running (via plug)
- name: 'Laundry Washing Machine State'
  unique_id: 'laundry_washing_machine_state'
  device_class: running
  icon: 'mdi:washing-machine'
  availability: >
    {{ is_number(states('sensor.laundry_washing_machine_plug_energy_power')) }}
  delay_off:
    minutes: 5
  # power reported in watts (w)
  state: >
    {% set power = states('sensor.laundry_washing_machine_plug_energy_power') | float(0) %}
    {{ power > 2 }}
