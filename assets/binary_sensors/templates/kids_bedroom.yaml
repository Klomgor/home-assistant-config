## BINARY SENSORS / TEMPLATES / KIDS BEDROOM

# -- sonoff --
# heater running (via plug)
- name: 'Kids Bedroom Heating State'
  unique_id: 'kids_bedroom_heating_state'
  device_class: running
  icon: 'mdi:radiator'
  availability: >
    {{ is_number(states('sensor.kids_room_heater_plug_energy_power')) }}
  # power reported in watts (w)
  state: >
    {% set power = states('sensor.kids_room_heater_plug_energy_power') | float(0) %}
    {{ power > 10 }}
